; 1. 基础 DNS 设置
[dns]
enable=true
ipv6=false
enhanced-mode=fake-ip
nameserver[]=114.114.114.114
nameserver[]=119.29.29.29
fallback[]=8.8.8.8
fallback[]=1.1.1.1

; 2. 节点重命名
reg_replace=^alihk-美国-RackNerd-
reg_replace=^86c043fe-日本-节点-

; 3. 策略组设置
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🌐 其他地区
custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,5,50

custom_proxy_group=🇭🇰 香港节点`select`[]♻️ 香港自动`(?i)(香港|hk|阿里)
custom_proxy_group=♻️ 香港自动`url-test`(?i)(香港|hk|阿里)`https://cp.cloudflare.com/generate_204`300,5,50

custom_proxy_group=🇺🇸 美国节点`select`[]♻️ 美国自动`(?i)(美国|us|RackNerd|Oracle)
custom_proxy_group=♻️ 美国自动`url-test`(?i)(美国|us|RackNerd|Oracle)`https://cp.cloudflare.com/generate_204`300,5,50

custom_proxy_group=🇯🇵 日本节点`select`[]♻️ 日本自动`(?i)(日本|jp|东京|大阪)
custom_proxy_group=♻️ 日本自动`url-test`(?i)(日本|jp|东京|大阪)`https://cp.cloudflare.com/generate_204`300,5,50

custom_proxy_group=🌐 其他地区`select`[]DIRECT`^(?!(.*(香港|hk|阿里|美国|us|RackNerd|Oracle|日本|jp|东京|大阪))).*

; 4. 分流逻辑
custom_proxy_group=🤖 ChatGPT`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇭🇰 香港节点`[]🌐 其他地区
custom_proxy_group=📹 YouTube`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]♻️ 自动选择
custom_proxy_group=💬 即时通讯`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]♻️ 自动选择
custom_proxy_group=🇬 谷歌服务`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]♻️ 自动选择
custom_proxy_group=🎯 全球直连`select`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎯 全球直连

; 5. 规则集
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=💬 即时通讯,[]GEOSITE,category-communication
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
ruleset=🐟 漏网之鱼,[]MATCH

enable_rule_generator=true
overwrite_original_rules=true