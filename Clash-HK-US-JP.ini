; ============================================
; 仅保留：香港 / 美国 / 日本（无德国、新加坡等）
; 仓库: https://github.com/jiminfeng/clash
; ============================================

; 1. 节点重命名（订阅里的前缀 → 地区名，便于分组匹配）
reg_replace=^cae83e95-`日本-
reg_replace=^alihk-`香港-
reg_replace=^ce457bff-`美国-RackNerd-
reg_replace=^86c043fe-`美国-Oracle-

; 2. 基础 DNS
[dns]
enable=true
nameserver[]=114.114.114.114
nameserver[]=119.29.29.29
fallback[]=8.8.8.8
fallback[]=1.1.1.1

; 3. 策略组（只保留：手动/自动/香港/美国/日本/其他）
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🌐 其他地区
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,5,50

custom_proxy_group=🇭🇰 香港节点`select`[]♻️ 香港自动`(?i)(香港|hk|阿里|alihk)
custom_proxy_group=♻️ 香港自动`url-test`(?i)(香港|hk|阿里|alihk)`http://www.gstatic.com/generate_204`300,5,50

custom_proxy_group=🇺🇸 美国节点`select`[]♻️ 美国自动`(?i)(美国|us|us2|RackNerd|Oracle|ce457bff|86c043fe)
custom_proxy_group=♻️ 美国自动`url-test`(?i)(美国|us|us2|RackNerd|Oracle|ce457bff|86c043fe)`http://www.gstatic.com/generate_204`300,5,50

custom_proxy_group=🇯🇵 日本节点`select`[]♻️ 日本自动`(?i)(日本|jp|jp2|东京|大阪|cae83e95)
custom_proxy_group=♻️ 日本自动`url-test`(?i)(日本|jp|jp2|东京|大阪|cae83e95)`http://www.gstatic.com/generate_204`300,5,50

; 其他地区：未匹配到港/美/日的节点，选 DIRECT 或可删掉此组
custom_proxy_group=🌐 其他地区`select`[]DIRECT`^(?!(.*(香港|hk|阿里|alihk|美国|us|us2|RackNerd|Oracle|ce457bff|86c043fe|日本|jp|jp2|东京|大阪|cae83e95))).*

; 4. 分流逻辑（只引用港/美/日）
custom_proxy_group=📢 谷歌FCM`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]♻️ 自动选择`[]🌐 其他地区
custom_proxy_group=🇬 谷歌服务`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]♻️ 自动选择`[]🌐 其他地区
custom_proxy_group=🤖 ChatGPT`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇭🇰 香港节点
custom_proxy_group=📹 YouTube`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点
custom_proxy_group=💬 即时通讯`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点
custom_proxy_group=🎯 全球直连`select`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎯 全球直连

; 5. 规则集
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
ruleset=📢 谷歌FCM,[]GEOSITE,googlefcm
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=💬 即时通讯,[]GEOSITE,category-communication
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
ruleset=🐟 漏网之鱼,[]MATCH

enable_rule_generator=true
overwrite_original_rules=true
