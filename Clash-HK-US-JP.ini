[custom]

; =========================================================
; Clash-HK-US-JP 订阅转换模板
; 适用路由器: 192.168.5.1 (ImmortalWrt / OpenClash Meta)
; 策略：仅保留香港 / 日本 / 美国三地区，精简功能分组
; 更新: 2026-04-30
; =========================================================

; === 节点重命名 ===
; 按供应商前缀统一标注地区，方便识别
; 不匹配的节点保留原名
reg_replace=^alihk`香港-阿里
reg_replace=^jp1`日本-JP1
reg_replace=^jp2`日本-JP2
reg_replace=^us1`美国-US1
reg_replace=^us2`美国-US2
reg_replace=^racknerd`美国-RackNerd
reg_replace=^ce457bff`美国-RackNerd
reg_replace=^86c043fe`美国-Oracle
reg_replace=^cae83e95`日本-节点
reg_replace=^aws-`新加坡-AWS-

; === 核心策略组 ===
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点
custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,50,3000

; === 地区组（纯自动测速，最低延迟） ===
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)(香港|hk|Hong.?Kong|阿里|alihk|HKG|九龙|Kowloon|新界|荃湾)`https://cp.cloudflare.com/generate_204`300,50,3000
custom_proxy_group=🇸🇬 新加坡节点`url-test`(?i)(新加坡|sg|Singapore|SIN|aws-|awssgp)`https://cp.cloudflare.com/generate_204`300,50,3000
custom_proxy_group=🇯🇵 日本节点`url-test`(?i)(日本|jp|Japan|东京|大阪|jp[0-9]|NRT|KIX|TYO|OSA|关西|Kansai|cae83e95)`https://cp.cloudflare.com/generate_204`300,50,3000
custom_proxy_group=🇺🇸 美国节点`url-test`(?i)(美国|us|United.?States|America|RackNerd|Oracle|us[0-9]|LAX|SFO|NYC|SEA|ATL|MIA|ORD|DFW|SJC|ce457bff|86c043fe)`https://cp.cloudflare.com/generate_204`300,50,3000

; === 全球直连 ===
custom_proxy_group=🎯 全球直连`select`[]DIRECT

