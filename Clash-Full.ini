; 1. 基础 DNS 设置
[dns]
enable=true
ip-filter[]=geosite:cn
nameserver[]=114.114.114.114
nameserver[]=119.29.29.29
fallback[]=8.8.8.8
fallback[]=1.1.1.1

; 2. 节点重命名
reg_replace=^alihk-美国-RackNerd-
reg_replace=^86c043fe-日本-节点-

; 3. 策略组设置
custom_proxy_group=🚀 手动选择[]♻️ 自动选择[]🇺🇸 美国节点[]🌐 其他地区
custom_proxy_group=♻️ 自动选择.*300,5,50

custom_proxy_group=🇭🇰 香港节点[]♻️ 香港自动url-testhttp://www.gstatic.com/generate_204select(?i)(美国|us|RackNerd|Oracle)
custom_proxy_group=♻️ 美国自动(?i)(美国|us|RackNerd|Oracle)300,5,50

custom_proxy_group=🇯🇵 日本节点[]♻️ 日本自动url-testhttp://www.gstatic.com/generate_204select^(?!(.*(香港|hk|阿里|美国|us|RackNerd|Oracle|日本|jp|东京|大阪))).*

; 4. 分流逻辑
custom_proxy_group=📢 谷歌FCM[]🇭🇰 香港节点[]🇯🇵 日本节点[]🌐 其他地区
custom_proxy_group=🇬 谷歌服务[]🇭🇰 香港节点[]🇯🇵 日本节点[]🌐 其他地区
custom_proxy_group=🤖 ChatGPT[]🇺🇸 美国节点[]🇭🇰 香港节点
custom_proxy_group=📹 YouTube[]🇭🇰 香港节点[]🇯🇵 日本节点
custom_proxy_group=💬 即时通讯[]🇭🇰 香港节点[]🇯🇵 日本节点
custom_proxy_group=🎯 全球直连[]DIRECT
custom_proxy_group=🐟 漏网之鱼[]🚀 手动选择[]🎯 全球直连

; 5. 规则集
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
ruleset=📢 谷歌FCM,[]GEOSITE,googlefcm
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=💬 即时通讯,[]GEOSITE,category-communication
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
ruleset=🐟 漏网之鱼,[]MATCH

enable_rule_generator=true
overwrite_original_rules=true
