; 此文件为 Clash-LIAN 配置备份，内容与 Clash-HK-US-JP.ini 同步
; 如需修改，请同时更新根目录的 Clash-LIAN.ini 和本文件
; 更新: 2026-04-30

[custom]

; === 节点重命名 ===
reg_replace=^alihk`香港-阿里
reg_replace=^jp1`日本-JP1
reg_replace=^jp2`日本-JP2
reg_replace=^us1`美国-US1
reg_replace=^us2`美国-US2
reg_replace=^racknerd`美国-RackNerd
reg_replace=^ce457bff`美国-RackNerd
reg_replace=^86c043fe`美国-Oracle
reg_replace=^cae83e95`日本-节点

; === 核心策略组 ===
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点
custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,50,3000

; === 地区组 ===
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)(香港|hk|Hong.?Kong|阿里|alihk|HKG)`https://cp.cloudflare.com/generate_204`300,50,3000
custom_proxy_group=🇯🇵 日本节点`url-test`(?i)(日本|jp|Japan|东京|大阪|jp[0-9]|NRT|KIX|TYO|cae83e95)`https://cp.cloudflare.com/generate_204`300,50,3000
custom_proxy_group=🇺🇸 美国节点`url-test`(?i)(美国|us|United.?States|America|RackNerd|Oracle|us[0-9]|LAX|SFO|NYC|ce457bff|86c043fe)`https://cp.cloudflare.com/generate_204`300,50,3000

; === 全球直连 ===
custom_proxy_group=🎯 全球直连`select`[]DIRECT

; === 功能分组 ===
custom_proxy_group=💬 即时通讯`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点
